databases:
  - name: vtuber-postgres
    databaseName: vtuber_db
    user: vtuber_user
    plan: free

services:
  - type: web
    name: vtuber-backend
    runtime: docker
    plan: free
    dockerContext: ./Backend
    dockerfilePath: ./Backend/Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: vtuber-postgres
          property: connectionString
      - key: DEFAULT_VOICE_VN
        value: vi-VN-HoaiMyNeural
      - key: DEFAULT_VOICE_EN
        value: en-US-GuyNeural
      - key: TTS_MOCK_MODE
        value: false
