version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: 3d_model_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: backend_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d backend_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 3d_model_api
    restart: always
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@db:5432/backend_db?schema=public
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
